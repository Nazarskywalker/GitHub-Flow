name: Add Jira Comment on Branch Deletion

on:
  delete:

jobs:
  add_comment:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: https://titarenkonazar548.atlassian.net
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      
      - name: Find Jira Key in Branch Name
        id: find_issue_key
        uses: atlassian/gajira-find-issue-key@v3
        with:
          from: branch
      
      - name: Check if KAN project
        id: check_kan
        run: |
          if echo "${{ steps.find_issue_key.outputs.issue }}" | grep -q "KAN-"; then
            echo "is_kan=true" >> $GITHUB_OUTPUT
          else
            echo "is_kan=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Comment on KAN issue
        if: steps.find_issue_key.outputs.issue != '' && steps.check_kan.outputs.is_kan == 'true'
        uses: atlassian/gajira-comment@v3
        with:
          issue: ${{ steps.find_issue_key.outputs.issue }}
          comment: |
            🗑️ Branch **${{ github.event.ref }}** was deleted in GitHub.
            
            **Details:**
            - Repository: ${{ github.repository }}
            - Deleted by: ${{ github.actor }}
            - Time: ${{ github.event.created_at }}