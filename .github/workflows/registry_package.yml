name: Create Jira Ticket for New Package Release

on:
  registry_package: 
    types: [published, updated]

jobs:
  create_jira_ticket:
    runs-on: ubuntu-latest
    steps:
      # Logs into Jira
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: https://titarenkonazar548.atlassian.net
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      
      # Creates a new Jira ticket for the package
      - name: Create new Jira ticket
        uses: atlassian/gajira-create@v3
        with:
          project: KAN
          issuetype: Task
          summary: Update documentation for ${{ github.event.package.name }} v${{ github.event.package.package_version }}
          description: |
            📦 *New Package Version Released*
            
            A new version of the package has been published to GitHub Registry.
            
            **Package Details:**
            • Name: ${{ github.event.package.name }}
            • Version: ${{ github.event.package.package_version }}
            • Repository: ${{ github.repository }}
            • Published by: ${{ github.actor }}
            • Event type: ${{ github.event.action }}
            
            **Action Required:**
            Please update the documentation to reflect changes in this new version.
            
            **Links:**
            • Package: ${{ github.event.package.html_url }}
            • Repository: https://github.com/${{ github.repository }}